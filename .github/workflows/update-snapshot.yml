name: Daily snapshot and Pages deploy

on:
  schedule:
    # Runs daily at 02:10 Asia/Shanghai.
    - cron: "10 18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh daily snapshot
        run: node scripts/update-snapshot.mjs

      - name: Commit snapshot changes
        run: |
          if [[ -n "$(git status --porcelain data/snapshot.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/snapshot.json
            git commit -m "Update daily model snapshot"
            git push
          else
            echo "No snapshot changes"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
